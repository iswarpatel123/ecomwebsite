name: Deploy Sites (CF Pages SSG)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      site:
        description: "Site slug (e.g. furniture). Empty = all changed sites."
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Deploy site(s)
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail

          deploy_one() {
            local slug="$1"
            echo "=== Deploy $slug ==="
            ./scripts/deploy-site.sh "$slug"
          }

          if [[ -n "${{ github.event.inputs.site }}" ]]; then
            deploy_one "${{ github.event.inputs.site }}"
            exit 0
          fi

          # On push: deploy site-* packages changed vs previous commit
          mapfile -t CHANGED < <(
            pnpm turbo run build --filter='...[HEAD~1]' --dry-run=json 2>/dev/null \
              | node -e '
                  let d=""; process.stdin.on("data",c=>d+=c); process.stdin.on("end",()=>{
                    try {
                      const j=JSON.parse(d);
                      const pkgs=j.packages||j.tasks?.map(t=>t.package)||[];
                      const names=Array.isArray(pkgs)?pkgs:Object.keys(pkgs);
                      for (const n of names) {
                        if (typeof n==="string" && n.startsWith("@dropshipping/site-"))
                          console.log(n.replace("@dropshipping/site-",""));
                      }
                    } catch { /* fallback below */ }
                  });
                '
          )

          if [[ ${#CHANGED[@]} -eq 0 || -z "${CHANGED[0]:-}" ]]; then
            # Fallback: path-based
            mapfile -t CHANGED < <(
              git diff --name-only HEAD~1 HEAD 2>/dev/null | sed -n 's|^sites/\([^/]*\)/.*|\1|p' | sort -u \
                | while read s; do
                    [[ -f "sites/$s/package.json" ]] || continue
                    node -p "require('./sites/$s/package.json').name.startsWith('@dropshipping/site-') ? '$s' : ''"
                  done | grep -v '^$' || true
            )
          fi

          if [[ ${#CHANGED[@]} -eq 0 || -z "${CHANGED[0]:-}" ]]; then
            echo "No site changes; skip deploy."
            exit 0
          fi

          for slug in "${CHANGED[@]}"; do
            deploy_one "$slug"
          done
