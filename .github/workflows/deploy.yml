name: Multi-Tenant Pages Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  detect-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Shared Code & Types
        run: pnpm build

      # Continuous Deployment on Main Branch (Independent Site deployments)
      - name: Deploy changed sites to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          # Use Turborepo to build changed applications
          # Compare with previous commit to isolate change set
          CHANGED_APPS=$(pnpm turbo list --filter="...[HEAD~1]" --json | jq -r '.packages[] | select(.name | startswith("@dropshipping/site-")) | .name')

          if [ -z "$CHANGED_APPS" ]; then
            echo "No site templates modified. Skipping individual pages deployments."
            exit 0
          fi

          for APP in $CHANGED_APPS; do
            echo "Processing deploy for application: $APP"

            # Extract folder directory name (e.g. @dropshipping/site-furniture -> furniture)
            APP_DIR=$(echo "$APP" | sed 's|@dropshipping/site-||')

            # Build specified site
            pnpm --filter "$APP" build

            # Publish to Cloudflare Pages via Wrangler CLI
            # Each site maps to its own separate Cloudflare Pages project
            PROJECT_NAME="ecom-dropship-$APP_DIR"
            echo "Publishing build output to Pages Project: $PROJECT_NAME..."

            npx wrangler pages deploy "sites/$APP_DIR/.output/public" \
              --project-name="$PROJECT_NAME" \
              --branch="main" \
              --commit-dirty=true
          done
